<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="状态切换器" />
<meta name="theme-color" content="#f7efe7" />
<title>状态切换器</title>
<style>
  :root{
    --bg:#f7efe7; --card:#fffaf5; --text:#2d2926; --muted:#776f68;
    --line:#eadfd4; --accent:#8d6e63; --accent2:#c6a58a; --soft:#f1e3d5;
    --danger:#b26a5b; --ok:#7b8f6a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:linear-gradient(180deg,#f7efe7 0%,#f9f4ee 70%,#fffaf5 100%);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",Arial,sans-serif;color:var(--text);min-height:100vh;padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom)}
  .wrap{max-width:520px;margin:0 auto;padding:22px 0 34px}
  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .brand{font-size:14px;color:var(--muted);letter-spacing:.08em}
  .reset{border:1px solid var(--line);background:rgba(255,250,245,.7);color:var(--muted);border-radius:999px;padding:8px 12px;font-size:13px}
  .card{background:rgba(255,250,245,.92);border:1px solid var(--line);border-radius:28px;padding:22px 18px;box-shadow:0 14px 38px rgba(141,110,99,.12)}
  h1{font-size:28px;line-height:1.18;margin:4px 0 10px;font-weight:760;letter-spacing:-.03em}
  h2{font-size:22px;line-height:1.25;margin:0 0 10px;font-weight:760;letter-spacing:-.02em}
  p{font-size:16px;line-height:1.65;margin:10px 0;color:var(--text)}
  .muted{color:var(--muted)}
  .quote{border-left:4px solid var(--accent2);padding:8px 0 8px 12px;margin:12px 0;color:#4a4038;background:#fff7ef;border-radius:12px}
  .grid{display:grid;gap:10px;margin-top:16px}
  button.choice{width:100%;text-align:left;border:1px solid var(--line);background:#fffdf9;color:var(--text);border-radius:18px;padding:15px 14px;font-size:16px;line-height:1.35;display:flex;gap:10px;align-items:flex-start;box-shadow:0 4px 14px rgba(141,110,99,.06)}
  button.choice:active{transform:scale(.99);background:var(--soft)}
  .emoji{font-size:22px;line-height:1.1;min-width:28px}
  .small{font-size:13px;color:var(--muted);margin-top:4px;display:block;line-height:1.45}
  .actions{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
  .primary,.secondary{border-radius:999px;padding:12px 16px;font-size:15px;border:1px solid var(--line)}
  .primary{background:var(--accent);color:white;border-color:var(--accent)}
  .secondary{background:#fffdf9;color:var(--muted)}
  textarea,input{width:100%;border:1px solid var(--line);border-radius:18px;background:#fffdf9;padding:14px;font-size:16px;line-height:1.4;color:var(--text);outline:none;margin-top:10px;font-family:inherit}
  textarea{min-height:92px;resize:vertical}
  .note{background:#fff7ef;border:1px solid #ead8c6;border-radius:20px;padding:14px;margin:14px 0;color:#51463f}
  .tag{display:inline-block;font-size:12px;color:#7b665a;background:#f1e3d5;border-radius:999px;padding:5px 9px;margin:4px 4px 0 0}
  .progress{height:6px;background:#efe4da;border-radius:999px;overflow:hidden;margin:8px 0 18px}.bar{height:100%;background:var(--accent2);width:20%;transition:.25s}
  .summary{white-space:pre-wrap;background:#fffdf9;border:1px dashed var(--accent2);border-radius:20px;padding:14px;font-size:15px;line-height:1.7}
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><div class="brand">MODE SWITCH</div><button class="reset" onclick="go('home')">回到首页</button></div>
  <div class="card" id="app"></div>
</div>
<script>
const S={};
const app=document.getElementById('app');
function set(k,v){S[k]=v}
function progress(n){return `<div class="progress"><div class="bar" style="width:${n}%"></div></div>`}
function esc(s){return (s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function go(page){window.scrollTo(0,0); routes[page]();}
function choice(emoji,title,sub,next,on){return `<button class="choice" onclick="${on||''};go('${next}')"><span class="emoji">${emoji}</span><span>${title}${sub?`<span class="small">${sub}</span>`:''}</span></button>`}
const routes={
 home(){app.innerHTML=`<h1>你现在需要哪种切换？</h1><p class="muted">不用想清楚。点最像你当下状态的那个。</p><div class="grid">
 ${choice('🌱','我想恢复，但又怕耽误工作','帮我摆脱“纯工作 / 纯休息”的二选一','recoverWork')}
 ${choice('🤝','我需要一点人的陪伴','帮我判断是活动、倾诉，还是恋爱陪伴','people')}
 ${choice('🪫','我一点劲都没有','判断今天还值不值得继续','lowEnergy')}
 ${choice('🌞','我准备开始工作','帮我进入一个小的工作状态','startWork')}
 ${choice('🔥','我很焦虑','先降下来，再决定下一步','anxiety')}
 ${choice('🌧','我脑子很乱','把混乱收束成一个动作','messy')}
 </div>`},
 recoverWork(){app.innerHTML=`${progress(20)}<h2>先判断：今天脑力还剩多少？</h2><p class="muted">这里不是考验自律，是为了选对策略。</p><div class="grid">
 ${choice('🔋','80%以上','可以推进一小块，但仍要设结束点','rwTask',"set('energy','80%以上')")}
 ${choice('🌓','50%左右','只做一个自然节点，不扩展','rwTask',"set('energy','50%左右')")}
 ${choice('🪫','20%以下','不创造新成果，只给明天铺路','rwTask',"set('energy','20%以下')")}
 </div>`},
 rwTask(){app.innerHTML=`${progress(40)}<h2>剩下的事属于哪一种？</h2><p class="muted">今天只选一个任务，不允许全都想。</p><div class="grid">
 ${choice('⏰','必须今天完成','有真实 deadline，不做会出问题','rwMust',"set('taskType','必须今天完成')")}
 ${choice('🌉','可以明天做，但怕明天进不了状态','这是“铺路模式”的典型场景','rwBridge',"set('taskType','明天做，但怕断线')")}
 ${choice('🧺','完全可以以后做','今天只需要放心恢复','rwLater',"set('taskType','以后做')")}
 </div>`},
 rwBridge(){app.innerHTML=`${progress(60)}<h2>今天不要完成它。</h2><div class="quote">今天的目标不是把事做完，而是让明天更容易开始。</div><p>写下明天第一件最小动作。</p><textarea id="first" placeholder="例如：打开语音排班模型文件，先看最后一次运行结果"></textarea><p>做到哪里就算完成？</p><textarea id="done" placeholder="例如：把视频排班模型问题列成 3 类；或收尾一个小模块"></textarea><p>什么时候必须停？</p><input id="stop" placeholder="例如：明天上午 10:30 / 做满 60 分钟就停"><div class="actions"><button class="primary" onclick="set('first',first.value);set('done',done.value);set('stop',stop.value);go('rwSummary')">生成明天启动卡</button></div>`},
 rwSummary(){app.innerHTML=`${progress(100)}<h2>好了，工作已经被安排了。</h2><p class="muted">现在可以去恢复，不是逃避。</p><div class="summary">明天第一步：${esc(S.first)||'打开相关文件，进入任务现场'}\n\n做到这里就算完成：${esc(S.done)||'完成一个小节点，不扩展'}\n\n停止条件：${esc(S.stop)||'到预设时间就停'}\n\n提醒：这不是“今天没完成”，而是“今天让明天更容易开始”。</div><div class="actions"><button class="primary" onclick="go('home')">我去恢复</button><button class="secondary" onclick="go('rwBridge')">改一下</button></div>`},
 rwMust(){app.innerHTML=`<h2>只做最低交付版。</h2><p>问自己：这件事做到什么程度，就足以避免明天出问题？</p><div class="note">只做“能交代”的版本，不做“漂亮”的版本。</div><div class="actions"><button class="primary" onclick="go('home')">回首页</button></div>`},
 rwLater(){app.innerHTML=`<h2>这件事今天不配占用你。</h2><p>它不是被放弃，而是被后移。现在的正确动作是恢复。</p><div class="actions"><button class="primary" onclick="go('home')">我去休息</button></div>`},
 people(){app.innerHTML=`${progress(30)}<h2>你需要哪一种陪伴？</h2><div class="grid">
 ${choice('🏊','有人陪着一起做点事','游泳、舞蹈、散步、逛展这类','activity')}
 ${choice('🪑','想找人深入聊聊','倾诉、复盘、被理解','talk')}
 ${choice('💗','想要恋爱里的陪伴感','被主动、被惦记、约会感','romance')}
 </div>`},
 activity(){app.innerHTML=`${progress(80)}<h2>你缺的是共同体验。</h2><p>优先选“活动是主体，聊天是附带”的社交。</p><div><span class="tag">游泳</span><span class="tag">舞蹈</span><span class="tag">散步</span><span class="tag">逛展</span><span class="tag">一起做饭</span></div><div class="note">不优先选：坐着吃饭聊三小时。那可能不是真正恢复。</div><p>今天真的需要再约一个人吗？</p><div class="grid">${choice('✅','需要','我还有空白和期待','inviteNeed')}${choice('🌿','不需要','这个周末已经够了，别塞满','inviteEnough')}</div>`},
 inviteNeed(){app.innerHTML=`<h2>约人也要轻一点。</h2><p>只发一个低压力邀请，不做复杂安排。</p><div class="summary">“我这周有点想找人一起做点事，不太想纯吃饭聊天。你最近哪天想一起散步/逛展/运动一下吗？”</div><div class="actions"><button class="primary" onclick="go('home')">完成</button></div>`},
 inviteEnough(){app.innerHTML=`<h2>这个需求已经被照顾到了。</h2><p>有舞蹈，有游泳，有朋友陪你做事。不要为了“社交”把周末塞满。</p><div class="actions"><button class="primary" onclick="go('home')">放心休息</button></div>`},
 talk(){app.innerHTML=`<h2>先别急着约人深聊。</h2><p>你已经有自己的思考空间，也有每周三咨询。现在可能不是缺倾诉，而是缺共同体验。</p><div class="actions"><button class="primary" onclick="go('people')">重新选择</button></div>`},
 romance(){app.innerHTML=`<h2>把期待放轻一点。</h2><p>如果对方主动，你可以接住；如果没有，你的生活也不需要停下来等信号。</p><div class="note">今天只判断：我现在要不要把自己的周末安排好？答案通常是：要。</div><div class="actions"><button class="primary" onclick="go('home')">回首页</button></div>`},
 lowEnergy(){app.innerHTML=`<h2>今天可能不是产出时间。</h2><p>只问一个问题：做 5 分钟铺路，能不能让明天更轻松？</p><div class="grid">${choice('🌉','可以','进入铺路模式','rwBridge')}${choice('🛁','不可以','直接恢复','rwLater')}</div>`},
 startWork(){app.innerHTML=`<h2>开始前只定三件事。</h2><p>1. 只做哪一件？<br>2. 第一小步是什么？<br>3. 什么时候停？</p><div class="actions"><button class="primary" onclick="go('rwBridge')">填写启动卡</button></div>`},
 anxiety(){app.innerHTML=`<h2>先降下来。</h2><p>把脚踩实，慢慢呼气三次。然后只问：现在最小的可控动作是什么？</p><div class="actions"><button class="primary" onclick="go('messy')">帮我收束</button></div>`},
 messy(){app.innerHTML=`<h2>混乱时，不做排序。</h2><p>只从脑子里倒出三件事，然后圈出最小的一件。</p><textarea placeholder="把脑子里的事倒在这里，不用写好。"></textarea><div class="actions"><button class="primary" onclick="go('home')">倒完了</button></div>`}
};
go('home');
</script>
</body>
</html>
